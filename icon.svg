<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="5" stdDeviation="9" flood-color="#92400E" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Paw print -->
  <g filter="url(#shadow)" fill="white">
    <!-- Toe pads -->
    <ellipse cx="148" cy="222" rx="44" ry="54" transform="rotate(-20 148 222)"/>
    <ellipse cx="213" cy="178" rx="44" ry="54" transform="rotate(-7 213 178)"/>
    <ellipse cx="299" cy="178" rx="44" ry="54" transform="rotate(7 299 178)"/>
    <ellipse cx="364" cy="222" rx="44" ry="54" transform="rotate(20 364 222)"/>
    <!-- Main pad -->
    <ellipse cx="256" cy="338" rx="102" ry="84"/>
  </g>
</svg>
